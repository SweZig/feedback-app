<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Feedback App</title>

    <!-- Spara auth-tokens från URL-hashen INNAN Supabase JS laddas och rensar den -->
    <script>
      (function() {
        var hash = window.location.hash;
        if (hash.includes('type=invite') || hash.includes('type=recovery')) {
          var params = new URLSearchParams(hash.slice(1));
          sessionStorage.setItem('supabase_auth_type', params.get('type') || '');
          sessionStorage.setItem('supabase_access_token', params.get('access_token') || '');
          sessionStorage.setItem('supabase_refresh_token', params.get('refresh_token') || '');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
