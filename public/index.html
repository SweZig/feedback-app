<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- PWA / Kiosk: no-zoom, fullscreen på iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#1e3a4f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Feedback App" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="NPS-enkäter för fysiska butiker och digitala kanaler" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Feedback App</title>

    <!-- Spara auth-tokens från URL-hashen INNAN Supabase JS laddas och rensar den -->
    <script>
      (function() {
        var hash = window.location.hash;
        if (hash.includes('type=invite') || hash.includes('type=recovery')) {
          var params = new URLSearchParams(hash.slice(1));
          sessionStorage.setItem('supabase_auth_type', params.get('type') || '');
          sessionStorage.setItem('supabase_access_token', params.get('access_token') || '');
          sessionStorage.setItem('supabase_refresh_token', params.get('refresh_token') || '');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>Du måste aktivera JavaScript för att köra appen.</noscript>
    <div id="root"></div>
  </body>
</html>
